{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2 class="text-white">
            <i class="fas fa-book-open"></i> Каталог статей
        </h2>
        <a href="/articles/new" class="btn btn-success">
            <i class="fas fa-plus"></i> Добавить статью
        </a>
    </div>
</div>


<!-- Real Content -->
<div class="content-loaded">
    <div class="row">
        {% for article in articles %}
        <div class="col-md-6 mb-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">{{ article.title }}</h5>
                    <p class="card-text text-muted">{{ article.content[:150] }}...</p>
                    <a href="/articles/{{ article.id }}" class="btn btn-primary">
                        <i class="fas fa-book-reader"></i> Читать полностью
                    </a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12">
            <div class="alert alert-info text-center">
                <i class="fas fa-info-circle"></i> Статей пока нет. 
                <a href="/articles/new" class="alert-link">Добавьте первую!</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
