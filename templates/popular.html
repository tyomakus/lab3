{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h4>
            <i class="fas fa-fire text-warning"></i> Популярные статьи
        </h4>
        {% for item in results %}
        <div class="card mb-3 p-3">
            <div class="d-flex justify-content-between align-items-center">
                <h5>{{ item.article.title }}</h5>
                <span class="badge bg-danger">
                    <i class="fas fa-eye"></i> Просмотров: {{ item.views }}
                </span>
            </div>
            <p>{{ item.article.content[:150] }}...</p>
            <a href="/articles/{{ item.article.id }}" class="btn btn-primary btn-sm">
                <i class="fas fa-book-reader"></i> Читать полностью
            </a>
        </div>
        {% else %}
        <p class="text-muted text-center">Данных о просмотрах пока нет.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
