{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-5 mb-4">
        <div class="card">
            <div class="card-body">
                <h3>
                    <i class="fas fa-user-plus"></i> Добавить автора
                </h3>
                <form action="/authors/new" method="post">
                    <div class="mb-3">
                        <input type="text" name="name" class="form-control" placeholder="Имя автора" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Email автора" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">
                        <i class="fas fa-save"></i> Создать автора
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card">
            <div class="card-body">
                <h3>
                    <i class="fas fa-users"></i> Список авторов
                </h3>
                <div class="list-group">
                    {% for author in authors %}
                    <div class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <strong>{{ author.name }}</strong><br>
                                <small class="text-muted">{{ author.email }}</small>
                            </div>
                            <span class="badge bg-primary">ID: {{ author.id }}</span>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="mt-3">
                    <a href="/articles/new" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Создать статью
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
