{% extends "base.html" %}

{% block content %}
<div class="card p-4">
    <h3>Добавить новую статью</h3>
    <form action="/articles/new" method="post">
        <div class="mb-3">
            <label>Название статьи</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Содержание</label>
            <textarea name="content" class="form-control" rows="6" required></textarea>
        </div>

        <div class="mb-3">
            <label>Автор</label>
            <select name="author_id" class="form-control" required>
                <option value="">-- Выберите автора --</option>
                {% for author in authors %}
                    <option value="{{ author.id }}">{{ author.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Категория</label>
            <select name="category_id" class="form-control" required>
                <option value="">-- Выберите категорию --</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.title }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label>Выпуск</label>
            <select name="issue_id" class="form-control" required>
                <option value="">-- Выберите выпуск --</option>
                {% for issue in issues %}
                    <option value="{{ issue.id }}">Выпуск №{{ issue.number }} ({{ issue.publish_date }})</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit" class="btn btn-success">Сохранить статью</button>
    </form>
</div>
{% endblock %}
