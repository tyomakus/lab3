<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Газетная редакция</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Стили для навбара */
        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border-bottom: 3px solid #f39c12;
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Georgia', serif;
        }

        .navbar-brand i {
            color: #f39c12;
            margin-right: 10px;
        }

        .nav-link {
            font-weight: 500;
            margin: 0 5px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: #f39c12 !important;
            transform: translateY(-2px);
        }

        .nav-link i {
            margin-right: 5px;
        }

        /* Анимация контейнера */
        .container {
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Стили для карточек */
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            overflow: hidden;
            background: white;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .card-body {
            padding: 2rem;
        }

        /* Стили для кнопок */
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
        }

        .btn-success:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(17,153,142,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349, #f45c43);
            border: none;
        }

        /* Стили для форм */
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e1e8ed;
            padding: 10px 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        /* Звезды рейтинга */
        .text-warning {
            color: #f39c12 !important;
        }

        /* Футер */
        footer {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 2rem 0;
            margin-top: 4rem;
            text-align: center;
        }

        footer i {
            margin: 0 5px;
        }

        footer a {
            color: #f39c12;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .card-body {
                padding: 1.5rem;
            }
            
            .navbar-brand {
                font-size: 1.3rem;
            }
        }
       
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-newspaper"></i> Газетная редакция
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">
                        <i class="fas fa-home"></i> Главная
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/articles/new">
                        <i class="fas fa-plus-circle"></i> Добавить статью
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/search">
                        <i class="fas fa-search"></i> Поиск
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/popular">
                        <i class="fas fa-fire"></i> Популярные
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    <div class="container">
        <p class="mb-0">
            <i class="fas fa-copyright"></i> 2026 Газетная редакция | 
            <i class="fas fa-heart" style="color: #f39c12;"></i> 
            Создано с любовью к журналистике
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
